<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vinci Snake</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
            color: #fff;
            font-family: sans-serif;
            touch-action: none;
        }
        #game-container {
            position: relative;
            border: 2px solid #444;
        }
        canvas {
            display: block;
            background-color: #000;
        }
        #score {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            width: 60px;
            height: 60px;
            background: #333;
            border: 1px solid #555;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            user-select: none;
        }
        .btn:active {
            background: #555;
        }
        #up { grid-column: 2; }
        #left { grid-column: 1; }
        #down { grid-column: 2; }
        #right { grid-column: 3; }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <div id="game-container">
        <canvas id="snakeGame"></canvas>
    </div>
    <div class="controls">
        <div></div><div class="btn" id="up">↑</div><div></div>
        <div class="btn" id="left">←</div><div class="btn" id="down">↓</div><div class="btn" id="right">→</div>
    </div>

    <script>
        const canvas = document.getElementById('snakeGame');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        const gridSize = 20;
        let tileCount;
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameSpeed = 150;

        function resize() {
            const size = Math.min(window.innerWidth - 40, 400);
            canvas.width = canvas.height = Math.floor(size / gridSize) * gridSize;
            tileCount = canvas.width / gridSize;
        }

        window.addEventListener('resize', resize);
        resize();

        function draw() {
            // Move snake
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Check collisions
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(s => s.x === head.x && s.y === head.y)) {
                resetGame();
                return;
            }

            snake.unshift(head);

            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = `Score: ${score}`;
                placeFood();
            } else {
                if (dx !== 0 || dy !== 0) snake.pop();
            }

            // Draw background
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            ctx.fillStyle = 'lime';
            snake.forEach(part => ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2));

            // Draw food
            ctx.fillStyle = 'red';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            setTimeout(draw, gameSpeed);
        }

        function placeFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            if (snake.some(s => s.x === food.x && s.y === food.y)) placeFood();
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.innerText = `Score: 0`;
            placeFood();
        }

        function handleInput(newDx, newDy) {
            if ((newDx === -dx && newDx !== 0) || (newDy === -dy && newDy !== 0)) return;
            dx = newDx;
            dy = newDy;
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp') handleInput(0, -1);
            if (e.key === 'ArrowDown') handleInput(0, 1);
            if (e.key === 'ArrowLeft') handleInput(-1, 0);
            if (e.key === 'ArrowRight') handleInput(1, 0);
        });

        document.getElementById('up').addEventListener('touchstart', () => handleInput(0, -1));
        document.getElementById('down').addEventListener('touchstart', () => handleInput(0, 1));
        document.getElementById('left').addEventListener('touchstart', () => handleInput(-1, 0));
        document.getElementById('right').addEventListener('touchstart', () => handleInput(1, 0));

        draw();
    </script>
</body>
</html>
